<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Random Demo Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      background-color: #444;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      color: #FFD700;
    }
    section {
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin: 20px auto;
      padding: 20px;
      max-width: 400px;
      text-align: center;
    }
    .card h2 {
      color: #333;
    }
    .card p {
      color: #555;
    }
    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 15px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Random Page</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Gallery</a>
    <a href="#">Contact</a>
  </nav>

  <section>
    <div class="card">
      <h2>Shivam Shekhawat Card</h2>
      <p>This is a randomly styled card with some placeholder text. You can add more cards or content here.</p>
    </div>
    <div class="card">
      <h2>Another Card</h2>
      <p>Experiment with CSS styles and HTML structure to make this page more interesting!</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Random Demo Page</p>
  </footer>
</body>
</html>
